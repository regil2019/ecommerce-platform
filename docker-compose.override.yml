# =============================================================================
# docker-compose.override.yml
# Este ficheiro é usado automaticamente quando corres: docker compose up database redis -d
# Permite correr APENAS a base de dados (MySQL + Redis) via Docker,
# enquanto o backend e frontend correm localmente com pnpm.
# =============================================================================

services:
  # Desabilita os serviços de aplicação neste override (apenas infra)
  backend:
    profiles:
      - app

  frontend:
    profiles:
      - app
